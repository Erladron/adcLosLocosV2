<ion-header class="ion-no-border" data-cy="global-page-header">
  <ion-toolbar class="custom-toolbar">

    <!-- ================================= -->
    <!-- LEFT BUTTON (HAMBURGUESA) -->
    <!-- ================================= -->
    <ion-buttons slot="start">
      <ion-menu-button *ngIf="showMenu" data-cy="header-menu-button"></ion-menu-button>
    </ion-buttons>

    <!-- ================================= -->
    <!-- TITLE -->
    <!-- ================================= -->
    <ion-title data-cy="header-title-text">
      {{ title }}
    </ion-title>

    <!-- ================================= -->
    <!-- RIGHT BUTTON (VOLVER ATRÁS) -->
    <!-- ================================= -->
    <ion-buttons slot="end">
      <ion-back-button *ngIf="showBack" [defaultHref]="backUrl" data-cy="header-back-button">
      </ion-back-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>
