<ion-app>

  <ion-menu *ngIf="canShowMenu()" contentId="main-content" type="overlay">

    <ion-content class="menu-content">

      <div class="menu-header">
        <img src="assets/img/escudo.png" class="menu-logo">
        <h2>A.C.D. Los Locos</h2>
        <p>Asociación Cultural y Deportiva</p>
      </div>

      <ion-list lines="none">

        <ion-item *ngIf="puedeVerInicio()" button (click)="navegar('/home')">
          <ion-icon name="home-outline" slot="start"></ion-icon>
          <ion-label>Inicio</ion-label>
        </ion-item>

        <ion-item *ngIf="puedeVerCarnet()" button (click)="navegar('/fair')">
          <ion-icon name="ticket-outline" slot="start"></ion-icon>
          <ion-label>Mi Carnet Feria</ion-label>
        </ion-item>

        <ion-item *ngIf="puedeVerInvitacionInvitado()" button (click)="navegar('/fair')">
          <ion-icon name="qr-code-outline" slot="start" style="color: #fbbf24;"></ion-icon>
          <ion-label style="color: #fbbf24; font-weight: 600;">Invitación de Feria</ion-label>
        </ion-item>

        <ion-item *ngIf="puedeEscanearFeria()" button (click)="navegar('/fair-scan')">
          <ion-icon name="scan-outline" slot="start"></ion-icon>
          <ion-label>Portería Caseta</ion-label>
        </ion-item>

        <ion-item *ngIf="puedeVerUsers()" button (click)="navegar('/gest-user')">
          <ion-icon name="people-outline" slot="start"></ion-icon>
          <ion-label>Usuarios</ion-label>
        </ion-item>

        <ion-item *ngIf="puedeVerEventos()" button (click)="navegar('/events')">
          <ion-icon name="calendar-outline" slot="start"></ion-icon>
          <ion-label>Eventos</ion-label>
        </ion-item>

        <ion-item button *ngIf="puedeInvitar()" (click)="navegar('/invite')">
          <ion-icon name="person-add-outline" slot="start"></ion-icon>
          <ion-label>Invitar</ion-label>
        </ion-item>

        <ion-item button (click)="logout()">
          <ion-icon name="log-out-outline" slot="start"></ion-icon>
          <ion-label>Cerrar sesión</ion-label>
        </ion-item>

      </ion-list>

      <div class="menu-footer">
        <p>Versión 1.0.0</p>
      </div>

    </ion-content>

  </ion-menu>

  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>

</ion-app>
