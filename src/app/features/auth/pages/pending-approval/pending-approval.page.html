<ion-content fullscreen="true" class="approval-content" data-cy="pending-approval-page">

  <div class="background-logo">

    <img src="assets/img/escudo.png" alt="Escudo">

  </div>

  <div class="approval-wrapper">

    <div class="approval-card glass-card">

      <div class="icon-container">

        <ion-icon name="checkmark-circle-outline" class="success-icon">

        </ion-icon>

      </div>

      <h1 data-cy="approval-status-title">

        Solicitud enviada

      </h1>

      <p data-cy="approval-welcome-msg">

        Hola {{ nombre }},

        tu solicitud se ha enviado
        correctamente.

      </p>

      <p>

        La directiva revisará tus datos
        y activará tu cuenta próximamente.

      </p>

      <div class="actions">

        <ion-button expand="block" fill="outline" color="light" (click)="logout()" data-cy="btn-approval-logout">

          <ion-icon slot="start" name="log-out-outline">

          </ion-icon>

          Cerrar sesión

        </ion-button>

      </div>

    </div>

  </div>

</ion-content>
