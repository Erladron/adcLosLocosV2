<app-page-header
  title="Inicio"
  [showMenu]="true">

</app-page-header>

<ion-content
  fullscreen="true"
  class="home-content">

  <div class="background-logo">

    <img
      src="assets/img/escudo.png"
      alt="Escudo">

  </div>

  <div class="home-container">

    <div class="welcome-section">

      <div>

        <h1>

          Hola,
          {{ currentUser?.nombre || 'Usuario' }}
          👋

        </h1>

        <p>
          Bienvenido a A.C.D. Los Locos
        </p>

      </div>

      <img
        src="assets/img/escudo.png"
        class="welcome-logo">

    </div>

    <div 
      class="glass-card profile-card"
      [routerLink]="['/user-detail', currentUser?.id]"
      style="cursor: pointer;">

      <div class="profile-header">

        <ion-icon
          name="person-outline">

        </ion-icon>

        <span>
          Mi información
        </span>

        <ion-icon 
          name="create-outline" 
          style="margin-left: auto; font-size: 18px; opacity: 0.6;">
        </ion-icon>

      </div>

      <div class="profile-content">

        <div class="profile-avatar">

          <img

            *ngIf="currentUser?.foto"

            [src]="currentUser?.foto"

          >

          <ion-icon

            *ngIf="!currentUser?.foto"

            name="person-outline"

          >

          </ion-icon>

        </div>

        <div class="profile-info">

          <div class="info-item">

            <span class="label">
              Nombre
            </span>

            <strong>
              {{ currentUser?.nombre }}
            </strong>

          </div>

          <div class="info-item">

            <span class="label">
              Rol
            </span>

            <div class="role-badge">

              {{ currentUser?.tipo }}

            </div>

          </div>

          <div class="info-item">

            <span class="label">
              Nº Socio
            </span>

            <strong>
              {{ currentUser?.numeroSocio || '--' }}
            </strong>

          </div>

          <div class="info-item">

            <span class="label">
              Estado
            </span>

            <div class="status-badge active">

              <ion-icon
                name="checkmark-circle">

              </ion-icon>

              Activo

            </div>

          </div>

        </div>

      </div>

    </div>

    <div class="section-title">

      Accesos rápidos

    </div>

    <div class="quick-grid">

      <div

        *ngIf="currentUser?.tipo !== 'invitado'"

        class="quick-card glass-card"

        routerLink="/gest-user"

      >

        <div class="quick-icon">

          <ion-icon
            name="people-outline">

          </ion-icon>

        </div>

        <div class="quick-info">

          <h3>
            Usuarios
          </h3>

          <p>
            Gestiona usuarios
          </p>

        </div>

        <ion-icon
          name="chevron-forward-outline"
          class="quick-arrow">

        </ion-icon>

      </div>

      <div

        class="quick-card glass-card"

        routerLink="/events"

      >

        <div class="quick-icon">

          <ion-icon
            name="calendar-outline">

          </ion-icon>

        </div>

        <div class="quick-info">

          <h3>
            Eventos
          </h3>

          <p>
            Consulta eventos
          </p>

        </div>

        <ion-icon
          name="chevron-forward-outline"
          class="quick-arrow">

        </ion-icon>

      </div>

    </div>

  </div>

</ion-content>
