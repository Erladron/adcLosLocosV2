<div class="section-card" data-cy="membership-form-card">

  <div class="section-header">
    <div>
      <h2>Membresía</h2>
      <p>Tipo de usuario y número de socio.</p>
    </div>

    <div *ngIf="isEditMode && canEditMembership" class="section-actions">
      <ion-button *ngIf="!editing" class="section-action-btn" shape="round" (click)="toggleEdit.emit()" data-cy="btn-membership-edit">
        <ion-icon slot="icon-only" name="create-outline"></ion-icon>
      </ion-button>
      <ion-button *ngIf="editing" class="section-action-btn save" shape="round" (click)="toggleEdit.emit()" data-cy="btn-membership-save">
        <ion-icon slot="icon-only" name="save-outline"></ion-icon>
      </ion-button>
      <ion-button *ngIf="editing" class="section-action-btn cancel" shape="round" (click)="cancelEdit.emit()" data-cy="btn-membership-cancel">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </div>
  </div>

  <div class="form-fields">

    <ion-item class="custom-item">
      <ion-label position="stacked">Tipo Usuario *</ion-label>
      <ion-select 
        interface="popover" 
        [interfaceOptions]="{ cssClass: 'glass-dropdown' }"
        [(ngModel)]="user.tipo"
        [disabled]="isEditMode && !editing"
        data-cy="select-membership-role">
        
        <ion-select-option value="administrador">Administrador</ion-select-option>
        <ion-select-option value="directiva">Directiva</ion-select-option>
        <ion-select-option value="socio">Socio</ion-select-option>
        <ion-select-option value="invitado">Invitado</ion-select-option>
        <ion-select-option value="portero">Portero / Seguridad</ion-select-option> </ion-select>
    </ion-item>

    <ion-item class="custom-item" *ngIf="user.tipo === 'socio' || user.tipo === 'directiva'">
      <ion-label position="stacked">Nº Socio</ion-label>
      <ion-input 
        [(ngModel)]="user.numeroSocio" 
        [readonly]="isEditMode && !editing"
        data-cy="input-membership-socio-num">
      </ion-input>
    </ion-item>

  </div>

</div>
