<app-page-header [title]="
    isVistaPublica
      ? 'Perfil del Socio'
      : (isEditMode ? 'Editar Usuario' : 'Alta Usuario')
  " [showMenu]="false" [showBack]="true" backUrl="/gest-user" data-cy="page-header">
</app-page-header>

<ion-content class="detail-content" data-cy="user-detail-content">

  <div class="background-logo">
    <img src="assets/img/escudo.png" alt="Escudo">
  </div>

  <div class="detail-container">

    <app-personal-data-form [user]="user" [imageChangedEvent]="imageChangedEvent" [croppedImage]="croppedImage"
      [mostrarCropper]="mostrarCropper" [isEditMode]="isEditMode" [editing]="editingPersonalData"
      [canEdit]="canEditPersonalData" [simpleMode]="isVistaPublica" (toggleEdit)="togglePersonalData()"
      (selectPhoto)="selectPhoto()" (takePhoto)="takePhoto()" (cancelEdit)="editingPersonalData = false"
      (imageCropped)="imageCropped($event)" (applyCropper)="applyCropper()" (cancelCropper)="cancelCropper()"
      data-cy="detail-personal-data-form">
    </app-personal-data-form>

    <app-membership-form *ngIf="!isProfileCompletion && !isVistaPublica" [user]="user"
      [tiposDisponibles]="tiposDisponibles" [isEditMode]="isEditMode" [editing]="editingMembership"
      [canEditMembership]="canEditMembership" (toggleEdit)="toggleMembership()" (cancelEdit)="editingMembership = false"
      data-cy="detail-membership-form">
    </app-membership-form>

    <app-credentials-form *ngIf="isOwnProfile || !isVistaPublica" [user]="user" [isEditMode]="isEditMode"
      [isOwnProfile]="isOwnProfile" [canEditCredentials]="canEditCredentials" [password]="password"
      [repeatPassword]="repeatPassword" (passwordChange)="password = $event"
      (repeatPasswordChange)="repeatPassword = $event" (sendResetLink)="onSendPasswordReset($event)"
      data-cy="detail-credentials-form">
    </app-credentials-form>

    <app-user-audit-form *ngIf="isEditMode && canViewAudit && !isVistaPublica" [user]="user"
      [canDeactivate]="canDeactivateUser" [canReactivate]="canReactivateUser" (deactivate)="deactivateUser()"
      (reactivate)="reactivateUser()" data-cy="detail-user-audit-form">
    </app-user-audit-form>

    <div *ngIf="isEditMode && isOwnProfile && user.estado === 'active'" class="self-delete-container"
      data-cy="profile-self-delete-wrapper">
      <ion-button expand="block" fill="outline" color="danger" class="btn-self-delete"
        (click)="solicitarBajaVoluntaria()" data-cy="btn-profile-self-delete">
        <ion-icon slot="start" name="trash-outline"></ion-icon>
        Eliminar mi cuenta definitivamente
      </ion-button>
    </div>

    <ion-button *ngIf="!isEditMode && !isVistaPublica" expand="block" class="main-button" (click)="save()"
      data-cy="btn-detail-create-user">
      <ion-icon slot="start" name="save-outline">
      </ion-icon>
      Crear Usuario
    </ion-button>

  </div>
</ion-content>
