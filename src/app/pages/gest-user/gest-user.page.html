<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Gestión de Usuarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true" class="users-content">

  <div class="background-logo">
    <img src="assets/img/escudo.png" alt="Escudo">
  </div>

  <div class="search-container">

    <ion-searchbar

      [(ngModel)]="searchText"

      (ionInput)="filterUsers()"

      placeholder="Buscar socio..."

      animated="true"

      class="custom-searchbar"

    >
    </ion-searchbar>

  </div>

  <div class="users-container">

    <div

      class="user-card glass-card"

      *ngFor="let user of filteredUsers"

      [routerLink]="['/user-detail', user.id]"

    >

      <!-- ================================= -->
      <!-- AVATAR -->
      <!-- ================================= -->

      <div class="user-avatar-container">

        <img

          *ngIf="user.foto"

          [src]="user.foto"

          class="user-avatar"

        >

        <div

          *ngIf="!user.foto"

          class="default-avatar"

        >

          <ion-icon

            name="person-outline"

          >
          </ion-icon>

        </div>

      </div>

      <!-- ================================= -->
      <!-- INFO -->
      <!-- ================================= -->

      <div class="user-info-mini">

        <h2>{{ user.nombre }}</h2>

        <div class="user-subinfo">

          <span class="tipo-badge">

            {{ user.tipo }}

          </span>

          <span class="dot">•</span>

          <span class="telefono-text">

            {{ user.telefono }}

          </span>

        </div>

      </div>

      <!-- ================================= -->
      <!-- FLECHA -->
      <!-- ================================= -->

      <ion-icon

        name="chevron-forward-outline"

        class="arrow-icon"

      >
      </ion-icon>

    </div>

  </div>

  <ion-fab

    *ngIf="canAddUsers"

    vertical="bottom"

    horizontal="end"

    slot="fixed"

    class="fab-safe-area"

  >

    <ion-fab-button

      (click)="nuevoUsuario()"

    >

      <ion-icon

        name="add-outline"

      >
      </ion-icon>

    </ion-fab-button>

  </ion-fab>

</ion-content>
