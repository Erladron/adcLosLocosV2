<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Inicio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true" class="home-content">
  <div class="background-logo">
    <img src="assets/img/escudo.png" alt="Escudo">
  </div>

  <div class="home-container">
    
    <div class="home-header">
      <h1>A.C.D. LOS LOCOS</h1>
      <div class="logo-main-container">
        <img src="assets/img/escudo.png" class="main-logo">
      </div>
    </div>

    <div *ngIf="isRegisteredUser()" class="status-wrapper">
      <div class="glass-card status-box">
        <ng-container *ngIf="!hasCompletedProfile()">
          <ion-icon name="alert-circle-outline" class="status-icon warning"></ion-icon>
          <h2>Cuenta pendiente</h2>
          <p>Tu cuenta aún no pertenece oficialmente a la asociación.</p>
          <p>Completa tus datos para la validación.</p>
          <ion-button expand="block" (click)="completarPerfil()" class="main-button">
            Completar perfil
          </ion-button>
        </ng-container>

        <ng-container *ngIf="hasCompletedProfile()">
          <ion-icon name="time-outline" class="status-icon clock"></ion-icon>
          <h2>En revisión</h2>
          <p>Tus datos han sido enviados correctamente.</p>
          <p>La directiva revisará tu solicitud próximamente.</p>
        </ng-container>
      </div>
    </div>

    <div class="cards-grid" *ngIf="!isRegisteredUser()">
      
      <div class="menu-card glass-card" routerLink="/gest-user">
        <div class="icon-box">
          <ion-icon name="people-outline"></ion-icon>
        </div>
        <span>Usuarios</span>
      </div>

      <div class="menu-card glass-card" routerLink="/stats">
        <div class="icon-box">
          <ion-icon name="stats-chart-outline"></ion-icon>
        </div>
        <span>Estadísticas</span>
      </div>

      <div class="menu-card glass-card" routerLink="/events">
        <div class="icon-box">
          <ion-icon name="calendar-outline"></ion-icon>
        </div>
        <span>Eventos</span>
      </div>

    </div>
  </div>
</ion-content>
