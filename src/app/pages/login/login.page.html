<ion-content fullscreen="true" class="login-content">
  <div class="background-logo">
    <img src="assets/img/escudo.png" alt="Escudo">
  </div>

  <div class="login-container">
    <div class="form-card">
      
      <div class="header-section">
        <div class="logo-circle">
          <img src="assets/img/escudo.png" alt="Logo">
        </div>
        <h2>Bienvenido</h2>
        <p>Accede a tu cuenta de socio</p>
      </div>

      <div class="form-section">
        <ion-item lines="none">
          <ion-input 
            label="Email" 
            labelPlacement="floating" 
            type="email" 
            [(ngModel)]="email" 
            placeholder="ejemplo@correo.com">
          </ion-input>
        </ion-item>

        <ion-item lines="none">
          <ion-input 
            [type]="showPassword ? 'text' : 'password'" 
            label="Contraseña" 
            labelPlacement="floating" 
            [(ngModel)]="password">
          </ion-input>
          <ion-button slot="end" fill="clear" (click)="showPassword = !showPassword" class="eye-button">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </ion-item>

        <div class="button-section">
          <ion-button expand="block" (click)="ingresar()" [disabled]="cargando" class="main-button">
            <span *ngIf="!cargando">Entrar</span>
            <ion-spinner *ngIf="cargando" name="crescent"></ion-spinner>
          </ion-button>
        </div>

        <div class="footer-links">
          <p>¿No tienes cuenta? <a (click)="irARegistro()">Solicitar registro</a></p>
        </div>
      </div>

    </div>
  </div>
</ion-content>
